<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리집 예산노트 🏠 신혼부부 가계부</title>
<style>
/* =========================================================
   우리집 예산노트 - 신혼부부 예산관리 웹앱
   - 순수 HTML/CSS/JavaScript (외부 라이브러리 없음)
   - 데이터는 localStorage에 자동 저장
   - 따뜻한 신혼집 감성 (베이지/크림/브라운/코랄)
   ========================================================= */

/* ---------- 색상 테마 변수 ---------- */
:root {
  --cream:        #fdf8f3;   /* 배경 크림 */
  --cream-2:      #fbf1e7;   /* 카드 안쪽 옅은 베이지 */
  --beige:        #f3e3d3;   /* 베이지 */
  --beige-deep:   #e8d2bb;   /* 진한 베이지 */
  --brown:        #8c6a52;   /* 연한 브라운(텍스트 강조) */
  --brown-deep:   #6b4f3c;   /* 진한 브라운(제목) */
  --coral:        #e8927c;   /* 따뜻한 코랄 (포인트) */
  --coral-deep:   #d97a63;   /* 진한 코랄 (버튼 hover) */
  --coral-soft:   #f7d9cf;   /* 옅은 코랄 배경 */
  --mint:         #9cc4ae;   /* 보조 - 절약/긍정 */
  --mint-soft:    #e2efe7;
  --warn:         #d98a5e;   /* 경고/초과 */
  --warn-soft:    #f7e6d6;
  --text:         #5a4a3d;   /* 본문 텍스트 */
  --text-soft:    #98897c;   /* 보조 텍스트 */
  --line:         #ecdcca;   /* 경계선 */
  --white:        #fffdfb;
  --shadow:       0 6px 22px rgba(150, 110, 80, 0.12);
  --shadow-sm:    0 3px 10px rgba(150, 110, 80, 0.10);
  --radius:       18px;
  --radius-sm:    12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
  background: var(--cream);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* 배경에 은은한 패턴 느낌 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 12% 18%, rgba(232,146,124,0.06), transparent 38%),
    radial-gradient(circle at 88% 82%, rgba(156,196,174,0.07), transparent 40%);
  pointer-events: none;
  z-index: 0;
}

button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* =========================================================
   PIN 잠금 화면
   ========================================================= */
#lockScreen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(155deg, var(--beige) 0%, var(--cream) 60%, var(--coral-soft) 130%);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.lock-card {
  background: var(--white);
  border-radius: 26px;
  box-shadow: var(--shadow);
  padding: 42px 36px;
  width: 90%; max-width: 360px;
  text-align: center;
}
.lock-card .emoji { font-size: 52px; }
.lock-card h1 { font-size: 22px; color: var(--brown-deep); margin: 8px 0 4px; }
.lock-card p { color: var(--text-soft); font-size: 14px; margin-bottom: 22px; }
.pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 24px; }
.pin-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--beige-deep); transition: .2s;
}
.pin-dot.filled { background: var(--coral); transform: scale(1.15); }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.pin-key {
  border: none; background: var(--cream-2);
  border-radius: 50%; aspect-ratio: 1;
  font-size: 22px; color: var(--brown-deep);
  font-weight: 600; transition: .15s;
}
.pin-key:hover { background: var(--beige); }
.pin-key:active { transform: scale(.92); }
.pin-key.action { font-size: 15px; color: var(--coral-deep); background: transparent; }
.lock-msg { color: var(--coral-deep); font-size: 13px; height: 18px; margin-top: 14px; }

/* =========================================================
   레이아웃
   ========================================================= */
#app { display: none; position: relative; z-index: 1; }

.layout { display: flex; min-height: 100vh; }

/* ---------- 사이드 메뉴 ---------- */
.sidebar {
  width: 232px; flex-shrink: 0;
  background: linear-gradient(180deg, var(--white), var(--cream-2));
  border-right: 1px solid var(--line);
  padding: 22px 14px;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px 18px; }
.brand .logo { font-size: 30px; }
.brand .title { font-size: 17px; font-weight: 800; color: var(--brown-deep); line-height: 1.2; }
.brand .sub { font-size: 11px; color: var(--text-soft); }

.nav { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.nav button {
  width: 100%; text-align: left; border: none; background: transparent;
  padding: 11px 14px; border-radius: 12px;
  font-size: 14.5px; color: var(--text); font-weight: 600;
  display: flex; align-items: center; gap: 11px; transition: .15s;
}
.nav button .ico { font-size: 17px; width: 22px; text-align: center; }
.nav button:hover { background: var(--cream); }
.nav button.active {
  background: linear-gradient(100deg, var(--coral) 0%, var(--coral-deep) 100%);
  color: #fff; box-shadow: var(--shadow-sm);
}

/* ---------- 메인 영역 ---------- */
.main { flex: 1; padding: 26px 30px 60px; min-width: 0; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 12px; }
.topbar h2 { font-size: 23px; color: var(--brown-deep); }
.topbar .desc { font-size: 13px; color: var(--text-soft); margin-top: 2px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

/* 월 필터 */
.month-filter {
  display: flex; align-items: center; gap: 6px;
  background: var(--white); border: 1px solid var(--line);
  border-radius: 12px; padding: 6px 10px; box-shadow: var(--shadow-sm);
}
.month-filter input { border: none; background: transparent; font-size: 14px; color: var(--brown-deep); font-weight: 600; }
.month-filter button { border: none; background: var(--cream-2); border-radius: 8px; width: 28px; height: 28px; font-size: 15px; color: var(--brown); }

/* ---------- 모바일 헤더 ---------- */
.mobile-header { display: none; }

/* =========================================================
   카드 / 공통 컴포넌트
   ========================================================= */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 22px;
  border: 1px solid rgba(236,220,202,0.6);
}
.card + .card { margin-top: 18px; }
.card-title { font-size: 16px; color: var(--brown-deep); font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card-title .badge { font-size: 11px; font-weight: 600; color: var(--coral-deep); background: var(--coral-soft); padding: 2px 9px; border-radius: 20px; margin-left: auto; }

.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }

/* 통계 카드 (대시보드) */
.stat {
  background: var(--white); border-radius: var(--radius);
  padding: 18px; box-shadow: var(--shadow-sm);
  border: 1px solid rgba(236,220,202,0.6); position: relative; overflow: hidden;
}
.stat .label { font-size: 12.5px; color: var(--text-soft); display: flex; align-items: center; gap: 6px; }
.stat .value { font-size: 22px; font-weight: 800; color: var(--brown-deep); margin-top: 6px; letter-spacing: -0.5px; }
.stat .value.sm { font-size: 18px; }
.stat .sub { font-size: 11.5px; color: var(--text-soft); margin-top: 3px; }
.stat::after { content: ""; position: absolute; right: -18px; top: -18px; width: 70px; height: 70px; border-radius: 50%; opacity: .12; }
.stat.income::after { background: var(--mint); }
.stat.expense::after { background: var(--coral); }
.stat.save::after { background: var(--brown); }
.stat.budget::after { background: var(--beige-deep); }
.stat .value.pos { color: var(--mint); }
.stat .value.neg { color: var(--coral-deep); }

/* 클릭 가능한 카드 (대시보드 → 해당 페이지 이동) */
.clickable { cursor: pointer; transition: transform .15s, box-shadow .15s; position: relative; }
.clickable:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.clickable:active { transform: translateY(-1px); }
.clickable .go { position: absolute; right: 14px; bottom: 12px; font-size: 13px; color: var(--coral); opacity: 0; transition: .15s; }
.clickable:hover .go { opacity: 1; }
.card.clickable:hover { border-color: var(--coral-soft); }

/* 버튼 */
.btn {
  border: none; border-radius: 12px; padding: 10px 18px;
  font-size: 14px; font-weight: 700; transition: .15s;
  display: inline-flex; align-items: center; gap: 7px;
}
.btn-primary { background: linear-gradient(100deg, var(--coral), var(--coral-deep)); color: #fff; box-shadow: var(--shadow-sm); }
.btn-primary:hover { filter: brightness(1.04); transform: translateY(-1px); }
.btn-soft { background: var(--cream-2); color: var(--brown); }
.btn-soft:hover { background: var(--beige); }
.btn-ghost { background: transparent; color: var(--text-soft); }
.btn-danger { background: #f3dcd4; color: var(--coral-deep); }
.btn-danger:hover { background: #efccc0; }
.btn-sm { padding: 6px 12px; font-size: 12.5px; border-radius: 9px; }

/* 폼 */
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; align-items: end; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12.5px; color: var(--brown); font-weight: 600; }
.field input, .field select, .field textarea {
  border: 1px solid var(--line); background: var(--cream);
  border-radius: 10px; padding: 9px 11px; font-size: 14px; color: var(--text);
  transition: .15s; width: 100%; min-width: 0; max-width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--coral); background: #fff;
  box-shadow: 0 0 0 3px var(--coral-soft);
}
.field textarea { resize: vertical; min-height: 40px; }

/* 테이블 */
.table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
th { text-align: left; padding: 10px 12px; color: var(--text-soft); font-weight: 700; font-size: 12px; border-bottom: 2px solid var(--line); white-space: nowrap; }
td { padding: 11px 12px; border-bottom: 1px solid var(--cream-2); color: var(--text); white-space: nowrap; }
tr:hover td { background: var(--cream); }
.tag { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 600; }
.tag.common { background: var(--mint-soft); color: #5a8a6e; }
.tag.wife { background: var(--coral-soft); color: var(--coral-deep); }
.tag.husband { background: #dde6f0; color: #5e7596; }
.tag.eun { background: var(--coral-soft); color: var(--coral-deep); }
.tag.sung { background: #dde6f0; color: #5e7596; }
.num { font-variant-numeric: tabular-nums; font-weight: 600; }
.num.in { color: #5a8a6e; }
.num.out { color: var(--coral-deep); }
.row-actions { display: flex; gap: 6px; }
.icon-btn { border: none; background: var(--cream-2); border-radius: 8px; width: 30px; height: 30px; font-size: 14px; color: var(--brown); transition: .12s; }
.icon-btn:hover { background: var(--beige); }
.icon-btn.del:hover { background: #f3dcd4; color: var(--coral-deep); }

/* 진행 막대 */
.progress { background: var(--cream-2); border-radius: 20px; height: 14px; overflow: hidden; position: relative; }
.progress .fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--coral), var(--coral-deep)); transition: width .5s ease; }
.progress .fill.mint { background: linear-gradient(90deg, #acd0bc, var(--mint)); }
.progress .fill.brown { background: linear-gradient(90deg, #b89a82, var(--brown)); }
.progress .fill.over { background: linear-gradient(90deg, #e8a06e, var(--warn)); }
.progress-label { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 5px; }
.progress-label .pct { font-weight: 700; }

/* 빈 데이터 안내 */
.empty { text-align: center; padding: 36px 18px; color: var(--text-soft); }
.empty .emoji { font-size: 40px; display: block; margin-bottom: 10px; }
.empty .hint { font-size: 13px; margin-top: 6px; background: var(--cream-2); display: inline-block; padding: 8px 14px; border-radius: 12px; }

/* 섹션 헤더 (폼 위) */
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.section-head h3 { font-size: 15px; color: var(--brown-deep); }

/* 페이지 전환 */
.page { display: none; animation: fade .35s ease; }
.page.active { display: block; }
@keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* 막대 차트 (대시보드 카테고리) */
.bar-chart { display: flex; flex-direction: column; gap: 11px; }
.bar-row { display: grid; grid-template-columns: 96px 1fr 92px; align-items: center; gap: 10px; font-size: 13px; }
.bar-row .name { color: var(--text); font-weight: 600; }
.bar-row .amt { text-align: right; color: var(--brown-deep); font-weight: 700; }
.bar-track { background: var(--cream-2); border-radius: 20px; height: 18px; overflow: hidden; }
.bar-track .b { height: 100%; border-radius: 20px; }

/* 토스트 알림 */
#toast {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--brown-deep); color: #fff; padding: 12px 22px; border-radius: 30px;
  font-size: 14px; font-weight: 600; box-shadow: var(--shadow); z-index: 9998;
  opacity: 0; transition: .35s; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* 모달 */
.modal-bg {
  position: fixed; inset: 0; background: rgba(90,74,61,0.4); z-index: 9990;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--white); border-radius: 22px; box-shadow: var(--shadow);
  padding: 28px; width: 100%; max-width: 400px; text-align: center;
}
.modal .emoji { font-size: 40px; }
.modal h3 { color: var(--brown-deep); margin: 10px 0 6px; font-size: 19px; }
.modal p { color: var(--text-soft); font-size: 14px; margin-bottom: 22px; }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; justify-content: center; }

/* 안내(사용법) */
.guide-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.guide-list li { display: flex; gap: 11px; align-items: flex-start; font-size: 13.5px; color: var(--text); }
.guide-list .step { background: var(--coral-soft); color: var(--coral-deep); font-weight: 800; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }

.hint-box { background: var(--mint-soft); border-radius: 12px; padding: 12px 15px; font-size: 13px; color: #5a8a6e; display: flex; gap: 9px; align-items: flex-start; margin-bottom: 16px; }

/* 일정 목록 */
.sched-list { display: flex; flex-direction: column; gap: 9px; }
.sched-item { display: flex; align-items: center; gap: 13px; background: var(--cream); border-radius: 14px; padding: 11px 14px; }
.sched-ic { font-size: 22px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: var(--white); border-radius: 12px; box-shadow: var(--shadow-sm); flex-shrink: 0; }
.sched-day { background: var(--cream-2); color: #333; border-radius: 12px; width: 44px; height: 46px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; line-height: 1; }
.sched-day span { font-size: 11px; font-weight: 700; margin-top: 2px; }
.sched-day.sat { background: #e6edf8; color: #3f6fc4; }   /* 토요일 = 파랑 */
.sched-day.sun { background: #fbe3e0; color: #e0524a; }   /* 일요일·공휴일 = 빨강 */
.sched-body { flex: 1; min-width: 0; }
.sched-title { font-size: 14px; font-weight: 700; color: var(--brown-deep); }
.sched-title .rep { font-size: 11px; color: var(--mint); font-weight: 600; }
.sched-sub { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
.sched-dday { font-size: 13px; font-weight: 800; color: var(--brown); background: var(--white); border-radius: 20px; padding: 5px 13px; flex-shrink: 0; box-shadow: var(--shadow-sm); }
.sched-dday.coral { background: var(--coral); color: #fff; }
.sched-dday.soft { color: var(--text-soft); }

/* 메뉴 편집 */
.menu-edit { display: flex; flex-direction: column; gap: 8px; }
.menu-edit-row { display: flex; align-items: center; gap: 10px; background: var(--cream); border-radius: 12px; padding: 8px 12px; border: 1.5px solid transparent; transition: .12s; }
.menu-edit-row .me-handle { cursor: grab; font-size: 17px; color: var(--text-soft); flex-shrink: 0; padding: 0 2px; touch-action: none; }
.menu-edit-row .me-handle:active { cursor: grabbing; }
.menu-edit-row.mdragging { opacity: .4; }
.menu-edit-row.mdragover { border-color: var(--coral); background: var(--coral-soft); }
.menu-edit-row .me-ico { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.menu-edit-row input { flex: 1; min-width: 0; border: 1px solid var(--line); background: var(--white); border-radius: 9px; padding: 8px 11px; font-size: 14px; color: var(--text); font-weight: 600; }
.menu-edit-row input:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 0 3px var(--coral-soft); }
.menu-edit-row .me-actions { display: flex; gap: 4px; flex-shrink: 0; }
.menu-edit-row .me-actions button { border: none; background: var(--white); border-radius: 8px; width: 32px; height: 30px; font-size: 12px; color: var(--brown); cursor: pointer; box-shadow: var(--shadow-sm); }
.menu-edit-row .me-actions button:hover:not(:disabled) { background: var(--beige); }
.menu-edit-row .me-actions button:disabled { opacity: .3; cursor: default; }

/* 클라우드 동기화 상태 */
.sync-status { font-size: 12.5px; font-weight: 600; padding: 8px 12px; border-radius: 10px; background: var(--cream-2); color: var(--text-soft); }
.sync-status.ok { background: var(--mint-soft); color: #5a8a6e; }
.sync-status.warn { background: var(--warn-soft); color: var(--warn); }
.sync-status.err { background: #f3dcd4; color: var(--coral-deep); }

/* 대시보드 위젯 그리드 (위치 변경) */
.dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; align-items: start; min-width: 0; }
.dash-item { min-width: 0; }              /* 그리드 항목이 화면보다 좁게 줄어들 수 있도록 (넘침 방지) */
.dash-item.full { grid-column: 1 / -1; }
.dash-item.half { grid-column: span 1; }
.dash-item.editing { outline: 2px dashed var(--coral); outline-offset: 3px; border-radius: 18px; cursor: grab; }
.dash-item.editing:active { cursor: grabbing; }
.dash-item.editing .dash-inner { pointer-events: none; }   /* 편집 중엔 카드 클릭 이동 방지 */
.dash-item.dragging { opacity: .4; }
.dash-item.dragover { outline-color: var(--brown-deep); outline-style: solid; }
.dash-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: var(--coral-soft); border-radius: 10px; padding: 5px 8px 5px 11px; margin-bottom: 9px; }
.dash-bar .dh { font-size: 11.5px; font-weight: 800; color: var(--coral-deep); }
.dash-bar .dm button { border: none; background: #fff; border-radius: 7px; width: 30px; height: 25px; font-size: 11px; color: var(--coral-deep); cursor: pointer; margin-left: 4px; font-weight: 800; pointer-events: auto; }
.dash-bar .dm button:hover { background: var(--cream); }
@media (max-width: 860px) {
  .dash-grid { grid-template-columns: 1fr; }
  .dash-item.half { grid-column: 1 / -1; }
}

/* 대시보드 편집 토글 */
.wtoggle-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
.wtoggle { display: inline-flex; align-items: center; gap: 7px; background: var(--cream-2); border: 1.5px solid transparent; border-radius: 12px; padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--text-soft); cursor: pointer; transition: .15s; }
.wtoggle.on { background: var(--coral-soft); color: var(--coral-deep); border-color: var(--coral); }
.wtoggle input { accent-color: var(--coral-deep); width: 15px; height: 15px; }

/* 어떤 화면에서도 가로 스크롤(잘림) 방지 */
html, body { max-width: 100%; overflow-x: hidden; }

@media (max-width: 520px) {
  .grid-4, .grid-3 { grid-template-columns: 1fr; }

}
/* 모바일: 입력 폼을 1열 전체폭으로 (칸 침범·잘림 방지) */
@media (max-width: 640px) {

}

<!-- Supabase 클라이언트 (클라우드 동기화용 · 인터넷 연결 시에만 사용) -->

<script>

// 일정 분류 (재정 / 개인 / 가족) 와 분류별 카테고리

function schedCatOptions(group, selected) {
  return (GROUP_CATS[group] || GROUP_CATS['재정'])
    .map(c => `<option ${c===selected?'selected':''}>${c}</option>`).join('');

const CAT_COLORS = {

const MENUS = [

/* =========================================================================
   ② 데이터 계층 (localStorage)
   - db 객체 하나에 모든 데이터를 담고, 변경 시 save()로 자동 저장
   - 데이터 구조:
     {
       incomes:   [{id,date,person,type,amount,memo}],
       expenses:  [{id,date,kind,category,payment,amount,memo}],
       savings:   [{id,date,purpose,amount,goal,memo}],
       loans:     [{id,name,initial,balance,rate,monthly,payday,memo}],
       repayments:[{id,loanId,date,amount,memo}],
       projects:  [{id,name,goal,current,targetDate,priority,status,memo}],
       budgets:   { "YYYY-MM": {common,wife,husband,saveGoal,saveRate} },
       settings:  { pin, owners, hasSample }
     }
   ========================================================================= */
let db = {};

// 기본(빈) 데이터 구조 반환
function emptyDB() {
  return {

// 불러오기 (없으면 샘플 포함 초기 데이터 생성)
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      db = JSON.parse(raw);
      // 누락된 키 보강 (버전 호환)
      const def = emptyDB();
      for (const k in def) if (!(k in db)) db[k] = def[k];
      if (!db.settings) db.settings = def.settings;
      if (!db.settings.dashWidgets) db.settings.dashWidgets = {};   // 대시보드 위젯 설정 보강
      if (!db.settings.dashOrder) db.settings.dashOrder = [];       // 대시보드 순서 보강
      if (!db.settings.currentUser) db.settings.currentUser = '은정';// 반응 사용자 보강
      if (!db.settings.menuOrder) db.settings.menuOrder = [];       // 메뉴 순서 보강
      if (!db.settings.menuNames) db.settings.menuNames = {};       // 메뉴 이름 보강
      if (!db.memos) db.memos = [];                                 // 메모 보강
    } catch(e) {
      db = emptyDB();
    }
  } else {
    db = emptyDB();
    seedSampleData();   // 최초 실행 시 샘플 데이터 주입
    save();
  }
}

/* =========================================================================
   ③ 유틸 함수
   ========================================================================= */
// 원화 포맷
function won(n) {
  n = Math.round(Number(n) || 0);
  return n.toLocaleString('ko-KR') + '원';
}
// 만원 단위 요약 (큰 숫자용)
function wonShort(n) {
  n = Number(n) || 0;
  if (Math.abs(n) >= 100000000) return (n/100000000).toFixed(n%100000000?1:0) + '억';
  if (Math.abs(n) >= 10000) return Math.round(n/10000).toLocaleString('ko-KR') + '만';
  return n.toLocaleString('ko-KR');
}
// 날짜 → YYYY-MM-DD
function fmtDate(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
// 날짜 → YYYY-MM
function fmtYM(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
// 개월 더하기
function addMonths(d, m) { const x = new Date(d); x.setMonth(x.getMonth()+m); return x; }
// 오늘 날짜 문자열
function today() { return fmtDate(new Date()); }
// 날짜 문자열이 현재 선택월에 속하는지
function inMonth(dateStr, ym) { return (dateStr || '').slice(0,7) === ym; }
// 안전 숫자
function num(v) { if (typeof v === 'string') v = v.replace(/,/g, ''); const n = Number(v); return isNaN(n) ? 0 : n; }
// 금액 입력칸에 세 자리마다 콤마 자동 삽입 (입력 중 호출)
function commaFormat(el) {
  const digits = (el.value || '').replace(/[^\d]/g, '');
  el.value = digits ? Number(digits).toLocaleString('ko-KR') : '';
}
// 금액 입력칸에 값(숫자)을 콤마 형식으로 채우기 (수정 시 사용)
function setMoney(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = (val || val === 0) && Number(val) ? Number(val).toLocaleString('ko-KR') : '';
}
// HTML 이스케이프 (메모 등 사용자 입력)
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// 사람 태그 클래스
function personTag(p) { return p === '은정' ? 'eun' : 'sung'; }
// 지출 구분 태그 클래스
function kindTag(k) { return k==='공동지출' ? 'common' : (k.includes('아내') ? 'wife' : 'husband'); }

/* =========================================================================
   ④ PIN 잠금
   - 최초 실행: PIN 등록(2번 입력) → 이후: PIN 입력으로 잠금 해제
   ========================================================================= */
let pinState = { entered:'', step:'check', first:'' };  // step: setup1 | setup2 | check

function initLock() {
  // PIN 패드 생성
  const pad = document.getElementById('pinPad');
  const keys = ['1','2','3','4','5','6','7','8','9','clear','0','del'];
  pad.innerHTML = keys.map(k => {
    if (k === 'clear') return `<button class="pin-key action" onclick="pinClear()">취소</button>`;
    if (k === 'del')   return `<button class="pin-key action" onclick="pinDel()">⌫</button>`;
    return `<button class="pin-key" onclick="pinPress('${k}')">${k}</button>`;
  }).join('');

  // PIN 등록 여부에 따라 단계 결정
  if (!db.settings.pin) {
    pinState.step = 'setup1';
    document.getElementById('lockSubtitle').textContent = '새 PIN 4자리를 만들어 주세요';
  } else {
    pinState.step = 'check';
    document.getElementById('lockSubtitle').textContent = 'PIN 번호를 입력해 주세요';
  }
  renderPinDots();

  // 키보드 입력 지원 (숫자키/백스페이스/ESC)
  document.addEventListener('keydown', onPinKeydown);
}

// 잠금 화면에서 키보드로 PIN 입력
function onPinKeydown(e) {
  // 앱이 이미 열려 있으면(잠금 해제됨) 무시
  if (document.getElementById('lockScreen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') {
    pinPress(e.key);
  } else if (e.key === 'Backspace') {
    e.preventDefault();
    pinDel();
  } else if (e.key === 'Escape') {
    pinClear();
  }
}

function renderPinDots() {
  const dots = document.getElementById('pinDots');
  dots.innerHTML = [0,1,2,3].map(i =>
    `<div class="pin-dot ${i < pinState.entered.length ? 'filled' : ''}"></div>`
  ).join('');
}

function pinPress(n) {
  if (pinState.entered.length >= 4) return;
  pinState.entered += n;
  renderPinDots();
  if (pinState.entered.length === 4) setTimeout(pinSubmit, 150);
}
function pinDel() { pinState.entered = pinState.entered.slice(0,-1); renderPinDots(); }
function pinClear() { pinState.entered = ''; renderPinDots(); document.getElementById('lockMsg').textContent=''; }

function pinSubmit() {
  const msg = document.getElementById('lockMsg');
  const code = pinState.entered;

  if (pinState.step === 'setup1') {
    pinState.first = code;
    pinState.entered = '';
    pinState.step = 'setup2';
    document.getElementById('lockSubtitle').textContent = '확인을 위해 한 번 더 입력해 주세요';
    renderPinDots();
  } else if (pinState.step === 'setup2') {
    if (code === pinState.first) {
      db.settings.pin = code;
      save();
      unlock();
    } else {
      msg.textContent = '두 번 입력한 PIN이 달라요. 다시 만들어 주세요';
      pinState.step = 'setup1'; pinState.first=''; pinState.entered='';
      document.getElementById('lockSubtitle').textContent = '새 PIN 4자리를 만들어 주세요';
      renderPinDots();
    }
  } else { // check
    if (code === db.settings.pin) {
      unlock();
    } else {
      msg.textContent = 'PIN이 맞지 않아요 😢';
      pinState.entered = '';
      renderPinDots();
    }
  }
}

function unlock() {
  document.removeEventListener('keydown', onPinKeydown);  // 키보드 리스너 정리
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  bootApp();
}

/* =========================================================================
   ⑤ 네비게이션 / 라우팅
   ========================================================================= */
let currentPage = 'dashboard';

// 메뉴 헬퍼 — 사용자 지정 순서/이름 반영
function menuById(id) { return MENUS.find(m => m.id === id); }
function menuName(m) {
  const nm = db.settings && db.settings.menuNames && db.settings.menuNames[m.id];
  return (nm && nm.trim()) || m.name;
}
// 저장된 메뉴 순서 (없는 항목 추가, 모르는 항목 제거)
function getMenuOrder() {
  const all = MENUS.map(m => m.id);
  const saved = (db.settings && db.settings.menuOrder) || [];
  const order = saved.filter(id => all.includes(id));
  all.forEach(id => { if (!order.includes(id)) order.push(id); });
  return order;
}

function buildNav() {
  const nav = document.getElementById('navMenu');
  // 대시보드는 상단 브랜드(우리집 예산노트)를 눌러 이동하므로 사이드 메뉴 목록에서는 제외
  nav.innerHTML = getMenuOrder().map(menuById).filter(m => m && m.id!=='dashboard').map(m =>
    `<li><button class="${m.id===currentPage?'active':''}" data-id="${m.id}" onclick="goto('${m.id}')">
       <span class="ico">${m.icon}</span>${esc(menuName(m))}</button></li>`
  ).join('');
}

// id: 이동할 페이지, isPop: 브라우저 뒤로/앞으로(popstate)에 의한 호출이면 true (히스토리 중복 추가 방지)
function goto(id, isPop) {
  const changed = (id !== currentPage);
  currentPage = id;
  const menu = MENUS.find(m => m.id === id);
  document.getElementById('pageTitle').textContent = menuName(menu);
  document.getElementById('pageDesc').textContent = menu.desc;

  // 페이지 전환
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');

  // nav 활성화
  document.querySelectorAll('#navMenu button').forEach(b =>
    b.classList.toggle('active', b.dataset.id === id));

  renderPage(id);

  // 브라우저 히스토리에 기록 → 마우스 뒤로가기로 이전 화면 복귀 가능
  if (!isPop && changed) {
    history.pushState({ page:id }, '', '#'+id);
  }

  // 모바일: 메뉴 닫기
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
  window.scrollTo(0,0);
}

// 브라우저 뒤로/앞으로 가기 → 해당 페이지로 이동 (히스토리 재기록 없이)
window.addEventListener('popstate', (e) => {
  if (document.getElementById('app').style.display === 'none') return;  // 잠금 화면이면 무시
  const id = (e.state && e.state.page) || 'dashboard';
  goto(id, true);
});

// 모바일: 화면 왼쪽 가장자리에서 오른쪽으로 스와이프 → 뒤로가기 (iOS 느낌)
let swipeX = 0, swipeY = 0, swipeEdge = false;
window.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  swipeX = t.clientX; swipeY = t.clientY;
  swipeEdge = t.clientX < 32;   // 왼쪽 가장자리에서 시작한 경우만
}, { passive: true });
window.addEventListener('touchend', (e) => {
  if (!swipeEdge) return;
  if (document.getElementById('app').style.display === 'none') return;  // 잠금 화면이면 무시
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeX, dy = t.clientY - swipeY;
  // 충분히 오른쪽으로, 세로 흔들림은 작게
  if (dx > 70 && Math.abs(dy) < 55) {
    // 대시보드(첫 화면)에서는 앱을 벗어나지 않도록 무시
    if (currentPage !== 'dashboard') history.back();
    else { document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.remove('show'); }
  }
}, { passive: true });

// 페이지별 렌더 분기
function renderPage(id) {
  switch(id) {
    case 'dashboard': renderDashboard(); break;
    case 'monthly':   renderMonthly();   break;
    case 'budget':    renderBudget();    break;
    case 'income':    renderIncome();    break;
    case 'expense':   renderExpense();   break;
    case 'account':   renderAccount();   break;
    case 'saving':    renderSaving();    break;
    case 'invest':    renderInvest();    break;
    case 'loan':      renderLoan();      break;
    case 'project':   renderProject();   break;
    case 'schedule':  renderSchedule();  break;
    case 'backup':    renderBackup();    break;
    case 'settings':  renderSettings();  break;
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('show');
}

/* =========================================================================
   ⑥ 월 필터
   ========================================================================= */
let curMonth = fmtYM(new Date());   // 현재 선택된 YYYY-MM

function initMonthFilter() {
  document.getElementById('monthPicker').value = curMonth;
}
function onMonthChange() {
  curMonth = document.getElementById('monthPicker').value || fmtYM(new Date());
  renderPage(currentPage);
}
function changeMonth(delta) {
  const [y,m] = curMonth.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  curMonth = fmtYM(d);
  document.getElementById('monthPicker').value = curMonth;
  renderPage(currentPage);
}

/* =========================================================================
   집계 헬퍼 (여러 페이지에서 공용)
   ========================================================================= */
// 선택월 수입 합계
function sumIncome(ym) {
  return db.incomes.filter(i => inMonth(i.date, ym)).reduce((s,i)=>s+num(i.amount),0);
}
// 선택월 지출 합계 (구분별 필터 가능)
function sumExpense(ym, kind) {
  return db.expenses.filter(e => inMonth(e.date, ym) && (!kind || e.kind===kind))
                    .reduce((s,e)=>s+num(e.amount),0);
}
// 선택월 저축 합계
function sumSaving(ym) {
  return db.savings.filter(s => inMonth(s.date, ym)).reduce((a,s)=>a+num(s.amount),0);
}
// 선택월 카테고리별 지출
function sumByCategory(ym) {
  const map = {};
  db.expenses.filter(e => inMonth(e.date, ym)).forEach(e => {
    map[e.category] = (map[e.category]||0) + num(e.amount);
  });
  return map;
}
// 선택월 결제수단별 지출
function sumByPayment(ym, method) {
  return db.expenses.filter(e => inMonth(e.date, ym) && e.payment===method)
                    .reduce((s,e)=>s+num(e.amount),0);
}

/* =========================================================================
   ⑦ 대시보드
   ========================================================================= */

// 전체 폭(2단)으로 표시할 위젯 — 나머지는 절반 폭
const DASH_FULL = ['summary','substats','schedule','memo','recent'];
// 저장된 위젯 순서 반환 (없는 키 추가, 모르는 키 제거)
function getDashOrder() {
  const all = DASH_WIDGETS.map(w=>w.key);
  const saved = (db.settings && db.settings.dashOrder) || [];
  const order = saved.filter(k=>all.includes(k));
  all.forEach(k=>{ if(!order.includes(k)) order.push(k); });
  return order;
}
// 위젯을 드래그/이동 가능한 래퍼로 감싸기
function dashWrap(key, inner) {
  const full = DASH_FULL.includes(key);
  const editing = dashEditMode;
  const dnd = editing
    ? `draggable="true" ondragstart="dashDragStart(event,'${key}')" ondragover="dashDragOver(event,this)" ondragleave="this.classList.remove('dragover')" ondrop="dashDrop(event,'${key}')" ondragend="dashDragEnd(event)"`
    : '';
  const bar = editing
    ? `<div class="dash-bar"><span class="dh">⠿ 드래그해서 이동</span>
        <span class="dm"><button onclick="moveWidget('${key}',-1)" title="앞으로">▲</button><button onclick="moveWidget('${key}',1)" title="뒤로">▼</button></span></div>`
    : '';
  return `<div class="dash-item ${full?'full':'half'} ${editing?'editing':''}" data-key="${key}" ${dnd}>
    ${bar}<div class="dash-inner">${inner}</div>
  </div>`;
}
// ----- 드래그 앤 드롭 -----
let dashDragKey = null;
function dashDragStart(e, key) { dashDragKey = key; e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('dragging'); }
function dashDragOver(e, el) { e.preventDefault(); e.dataTransfer.dropEffect='move'; if(el) el.classList.add('dragover'); }
function dashDragEnd(e) { dashDragKey=null; document.querySelectorAll('.dash-item').forEach(d=>d.classList.remove('dragging','dragover')); }
function dashDrop(e, targetKey) {
  e.preventDefault();
  if (!dashDragKey || dashDragKey===targetKey) return;
  const order = getDashOrder();
  order.splice(order.indexOf(dashDragKey), 1);   // 드래그한 항목 제거
  order.splice(order.indexOf(targetKey), 0, dashDragKey);  // 대상 앞에 삽입
  db.settings.dashOrder = order; save(); renderDashboard();
}
// ▲▼ 버튼: 보이는 위젯 기준 앞/뒤 이웃과 자리 교환
function moveWidget(key, dir) {
  const order = getDashOrder();
  const visible = order.filter(k=>widgetOn(k));  // 켜진 위젯만
  const vi = visible.indexOf(key), vj = vi + dir;
  if (vi<0 || vj<0 || vj>=visible.length) return;
  const targetKey = visible[vj];
  const i = order.indexOf(key), t = order.indexOf(targetKey);
  [order[i], order[t]] = [order[t], order[i]];
  db.settings.dashOrder = order; save(); renderDashboard();
}

let dashEditMode = false;   // 대시보드 편집 모드

// 위젯이 켜져 있는지 (기본값 true, 명시적 false만 숨김)
function widgetOn(key) {
  const w = (db.settings && db.settings.dashWidgets) || {};
  return w[key] !== false;
}
// 위젯 켜기/끄기
function toggleWidget(key) {
  if (!db.settings.dashWidgets) db.settings.dashWidgets = {};
  db.settings.dashWidgets[key] = !widgetOn(key);
  save(); renderDashboard();
}
// 편집 모드 토글
function toggleDashEdit() { dashEditMode = !dashEditMode; renderDashboard(); }
// 카드 두 개를 2단 그리드로 묶기 (하나만 켜져 있으면 단독, 둘 다 꺼졌으면 빈 문자열)
function pairHTML(a, b) {
  const items = [a, b].filter(Boolean);
  if (items.length === 2) return `<div class="grid grid-2" style="margin-bottom:18px">${items.join('')}</div>`;
  if (items.length === 1) return `<div style="margin-bottom:18px">${items[0]}</div>`;
  return '';
}

/* ---------- 우리집 메모판 ---------- */
function addMemo() {
  const el = document.getElementById('dash-memo-input');
  const t = (el && el.value || '').trim();
  if (!t) return toast('메모 내용을 입력해 주세요 🙏');
  const authorEl = document.getElementById('dash-memo-author');
  const author = (authorEl && authorEl.value) || currentUser();
  db.memos.push({ id:uid(), date:today(), text:t, author });
  save(); toast('메모를 추가했어요 📝'); renderDashboard();
}
function delMemo(id) {
  db.memos = db.memos.filter(m=>m.id!==id);
  save(); toast('메모를 삭제했어요'); renderDashboard();
}
function editMemo(id) {
  const m = db.memos.find(x=>x.id===id); if(!m) return;
  const v = prompt('메모를 수정하세요', m.text);
  if (v===null) return;
  const t = v.trim(); if(!t) return;
  m.text = t; save(); toast('메모를 수정했어요 ✏️'); renderDashboard();
}
// 메모에 댓글 달기
function addComment(memoId) {
  const m = db.memos.find(x=>x.id===memoId); if(!m) return;
  const input = document.getElementById('cm-input-'+memoId);
  const t = (input && input.value || '').trim();
  if (!t) return toast('댓글 내용을 입력해 주세요 🙏');
  if (!m.comments) m.comments = [];
  const author = document.getElementById('cm-author-'+memoId).value;
  m.comments.push({ id:uid(), author, text:t, date:today() });
  save(); toast('댓글을 남겼어요 💬'); renderDashboard();
}
// 댓글 삭제
function delComment(memoId, commentId) {
  const m = db.memos.find(x=>x.id===memoId); if(!m || !m.comments) return;
  m.comments = m.comments.filter(c=>c.id!==commentId);
  save(); toast('댓글을 삭제했어요'); renderDashboard();
}

const REACTION_LIST = [
  { id:'r1', label:'하트' },
  { id:'r2', label:'갸웃' },
  { id:'r3', label:'멋쩍' },
  { id:'r4', label:'놀람' },
  { id:'r5', label:'반짝' },
  { id:'r6', label:'뾰로통' },
];
// 현재 반응을 누르는 사람 (은정/성현)
function currentUser() { return (db.settings && db.settings.currentUser) || '은정'; }
function setMemoUser(name) { db.settings.currentUser = name; save(); renderDashboard(); }

// 반응 데이터를 이름 배열로 정규화 (예전 숫자 카운트 데이터 호환)
function reactArr(reactions, id) {
  const v = reactions && reactions[id];
  if (Array.isArray(v)) return v;
  return [];   // 숫자 등 옛 형식은 비움(이름 정보가 없으므로)
}
// 반응 버튼 줄 HTML — clickFn: "reactMemo('id'," 형태의 호출 접두
function reactionBar(reactions, clickFn, sizeCls) {
  const me = currentUser();
  return `<div class="react-bar">${REACTION_LIST.map(r=>{
    const arr = reactArr(reactions, r.id);
    const mine = arr.includes(me);
    const title = arr.length ? `${arr.join(', ')} 님이 눌렀어요` : r.label;
    return `<button class="rimg ${sizeCls||''} ${arr.length?'has':''} ${mine?'mine':''}" title="${title}" onclick="event.stopPropagation();${clickFn}'${r.id}')">`
      + `<img src="${REACTION_IMG[r.id]||''}" alt="${r.label}">`
      + `${arr.length?`<span class="who">${arr.join('·')}</span>`:''}</button>`;
  }).join('')}</div>`;
}
// 반응 토글 공통 (대상 객체의 reactions[id] 이름 배열에서 현재 사용자 추가/제거)
function toggleReaction(obj, id) {
  if (!obj.reactions) obj.reactions = {};
  const me = currentUser();
  let arr = reactArr(obj.reactions, id);
  if (arr.includes(me)) arr = arr.filter(n=>n!==me);   // 이미 눌렀으면 취소
  else arr = [...arr, me];                              // 아니면 추가
  if (arr.length) obj.reactions[id] = arr; else delete obj.reactions[id];
}
// 메모 자체에 반응
function reactMemo(memoId, id) {
  const m = db.memos.find(x=>x.id===memoId); if(!m) return;
  toggleReaction(m, id);
  save(); renderDashboard();
}
// 댓글에 반응
function reactComment(memoId, commentId, id) {
  const m = db.memos.find(x=>x.id===memoId); if(!m || !m.comments) return;
  const c = m.comments.find(x=>x.id===commentId); if(!c) return;
  toggleReaction(c, id);
  save(); renderDashboard();
}

// 백분율 (0~100, 정수)
function pctOf(part, whole) {
  whole = num(whole); if (whole <= 0) return 0;
  return Math.round(num(part)/whole*100);
}
// 빈 상태 박스
function emptyBox(title, hint) {
  return `<div class="empty"><span class="emoji">🌼</span>${title}<div class="hint">💡 ${hint}</div></div>`;
}
// 최근 내역 통합 (수입/지출/저축)
function buildRecent(limit) {
  const items = [];
  db.incomes.forEach(i => items.push({ date:i.date, sort:i.date, dir:'in', amount:num(i.amount),
    tagClass:personTag(i.person), tagText:i.person, desc:`${i.type} · ${i.memo||'수입'}` }));
  db.expenses.forEach(e => items.push({ date:e.date, sort:e.date, dir:'out', amount:num(e.amount),
    tagClass:kindTag(e.kind), tagText:e.kind.replace(' 개별지출','').replace('지출',''), desc:`${e.category} · ${e.memo||e.payment}` }));
  db.savings.forEach(s => items.push({ date:s.date, sort:s.date, dir:'in', amount:num(s.amount),
    tagClass:'common', tagText:'저축', desc:`${s.purpose} · ${s.memo||'저축'}` }));
  return items.sort((a,b)=> (b.sort||'').localeCompare(a.sort||'')).slice(0, limit);
}

/* =========================================================================
   ⑧ 수입 관리
   ========================================================================= */
function renderIncome() {
  const ym = curMonth;
  const list = db.incomes.filter(i => inMonth(i.date, ym))
                         .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total = list.reduce((s,i)=>s+num(i.amount),0);
  const eun = list.filter(i=>i.person==='은정').reduce((s,i)=>s+num(i.amount),0);
  const sung = list.filter(i=>i.person==='성현').reduce((s,i)=>s+num(i.amount),0);

  document.getElementById('page-income').innerHTML = `
    <div class="card">
      <div class="section-head"><h3>➕ 수입 입력</h3></div>
      <div class="hint-box">💡 부부의 수입을 사람별로 따로 기록하면 누가 얼마를 벌었는지 한눈에 보여요.</div>

// 통장 입금(이체) 누적 합계
function sumDeposits(ym) {
  return db.accountDeposits.filter(d => !ym || inMonth(d.date, ym))
                           .reduce((s,d)=>s+num(d.amount),0);
}
// 통장에서 쓴 지출 누적 합계 (결제수단 = 생활비통장)
function sumAccountSpent(ym) {
  return db.expenses.filter(e => e.payment==='생활비통장' && (!ym || inMonth(e.date, ym)))
                    .reduce((s,e)=>s+num(e.amount),0);
}
// 현재 통장 잔액 (전체 기간 누적)
function accountBalance() {
  return sumDeposits(null) - sumAccountSpent(null);
}

// 예산 막대 (절약/초과 표시). isSave=true면 많이 할수록 좋음
function budgetBar(name, used, budget, isSave=false) {
  budget = num(budget);
  if (budget <= 0) {
    return `<div style="margin-bottom:16px">
      <div class="progress-label"><span>${name}</span><span style="color:var(--text-soft)">예산 미설정</span></div>
      <div class="progress"><div class="fill" style="width:0%"></div></div>
      <div style="font-size:12px;color:var(--text-soft);margin-top:4px">사용 ${won(used)}</div>
    </div>`;
  }
  const pct = used/budget*100;
  const over = !isSave && used > budget;
  const diff = budget - used;
  let status, cls;
  if (isSave) {
    status = used>=budget ? `🎉 목표 달성! (${won(used-budget)} 초과 달성)` : `목표까지 ${won(diff)} 남음`;
    cls = used>=budget ? 'mint' : '';
  } else {
    status = over ? `⚠️ ${won(used-budget)} 초과` : `👍 ${won(diff)} 절약 중`;
    cls = over ? 'over' : 'mint';
  }
  return `<div style="margin-bottom:16px">
    <div class="progress-label"><span>${name}</span><span class="pct">${Math.round(pct)}%</span></div>
    <div class="progress"><div class="fill ${cls}" style="width:${Math.min(100,pct)}%"></div></div>
    <div style="font-size:12px;margin-top:4px;color:${(over||(isSave&&used<budget))?'var(--coral-deep)':'#5a8a6e'}">
      사용 ${won(used)} / 예산 ${won(budget)} · ${status}</div>
  </div>`;
}
function saveBudget() {
  db.budgets[curMonth] = {
    common: num(document.getElementById('bd-common').value),
    wife: num(document.getElementById('bd-wife').value),
    husband: num(document.getElementById('bd-husband').value),

function renderSaving() {
  const ym = curMonth;
  const list = db.savings.filter(s => inMonth(s.date, ym))
                         .sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  // 목적별 누적 (전체 기간) + 목표 (최신 입력 기준)

        <div class="field" style="grid-column:span 2"><label>메모</label><input type="text" id="sv-memo" placeholder="예: 주택청약+적금"></div>

    </div>

    <div class="card">
      <div class="card-title">🐷 ${ym} 저축 내역 <span class="badge">${list.length}건 · ${won(total)}</span></div>

        <thead><tr><th>날짜</th><th>목적</th><th style="text-align:right">금액</th><th style="text-align:right">목표</th><th>메모</th><th></th></tr></thead>

          </tr>`).join('')}

function addSaving() {
  const amount = num(document.getElementById('sv-amount').value);

  db.savings.push({
    id:uid(),
    date: document.getElementById('sv-date').value || today(),
    purpose: document.getElementById('sv-purpose').value,
    amount, goal: num(document.getElementById('sv-goal').value),

  });

function editSaving(id) {
  const s = db.savings.find(x=>x.id===id); if(!s) return;
  document.getElementById('sv-date').value=s.date;

        <div class="field"><label>종목명</label><input type="text" id="iv-name" placeholder="예: 미국 S&P500 ETF"></div>

        <div class="field"><label>현재 평가금액(원)</label><input type="text" inputmode="numeric" id="iv-current" placeholder="0" oninput="commaFormat(this)"></div>

    <div class="card">
      <div class="card-title">📈 보유 종목 <span class="badge">${list.length}개</span></div>

        <tbody>${list.map(v=>{
          const profit = num(v.current)-num(v.invested);

            <td>${v.type}</td>
            <td><span class="tag ${v.holder==='은정'?'eun':(v.holder==='성현'?'sung':'common')}">${v.holder}</span></td>

      : emptyBox('아직 등록된 투자 종목이 없어요','위 폼에서 첫 종목을 등록해 보세요. 예) 미국 S&P500 ETF · 원금 500만 · 평가 565만')}

function addInvestment() {
  const name = document.getElementById('iv-name').value.trim();
  if (!name) return toast('종목명을 입력해 주세요 🙏');
  const invested = num(document.getElementById('iv-invested').value);
  const currentRaw = document.getElementById('iv-current').value;
  db.investments.push({
    id:uid(), name,
    type: document.getElementById('iv-type').value,
    holder: document.getElementById('iv-holder').value,
    invested,
    current: currentRaw==='' ? invested : num(currentRaw),  // 평가액 미입력 시 원금과 동일
    updated: today(),
    memo: document.getElementById('iv-memo').value.trim()
  });
  save(); toast('투자 종목을 등록했어요 📈'); renderInvest();
}
function editInvestment(id) {
  const v = db.investments.find(x=>x.id===id); if(!v) return;
  document.getElementById('iv-name').value=v.name;
  document.getElementById('iv-type').value=v.type;
  document.getElementById('iv-holder').value=v.holder;
  setMoney('iv-invested', v.invested);
  setMoney('iv-current', v.current);
  document.getElementById('iv-memo').value=v.memo||'';
  db.investments = db.investments.filter(x=>x.id!==id); save();
  window.scrollTo({top:0,behavior:'smooth'}); toast('수정 후 다시 등록해 주세요 ✏️'); renderInvest();
}
// 추가 매수: 원금과 평가액을 함께 늘림
function buyInvestment(id) {
  const v = db.investments.find(x=>x.id===id); if(!v) return;
  const input = prompt(`"${v.name}"에 추가 매수한 금액(원)을 입력하세요`, '');
  if (input===null) return;
  const amt = num(input);
  if (amt<=0) return toast('금액을 확인해 주세요');
  v.invested = num(v.invested) + amt;
  v.current = num(v.current) + amt;
  v.updated = today();
  save(); toast(`${won(amt)} 추가 매수했어요 💸`); renderInvest();
}
// 평가액 갱신: 현재 잔고만 업데이트
function updateInvestValue(id) {
  const v = db.investments.find(x=>x.id===id); if(!v) return;
  const input = prompt(`"${v.name}"의 현재 평가금액(원)을 입력하세요`, v.current);
  if (input===null) return;
  const val = num(input);
  v.current = val;
  v.updated = today();
  save(); toast('평가금액을 갱신했어요 🔄'); renderInvest();
}

// 현재 잔액·금리(·남은 개월수)로 월 납입액 자동 계산
function calcLoanPayment() {
  const bal = num(document.getElementById('ln-balance').value);
  const rate = parseFloat(document.getElementById('ln-rate').value) || 0;
  const months = num(document.getElementById('ln-months').value);
  const box = document.getElementById('ln-calc');
  if (bal <= 0 || rate <= 0) { if(box) box.style.display='none'; return; }
  const mRate = rate / 100 / 12;             // 월 이자율
  const interest = Math.round(bal * mRate);  // 월 이자
  let payment, desc;
  if (months > 0) {
    // 원리금균등 월 상환액 = P·r·(1+r)^n / ((1+r)^n - 1)
    const f = Math.pow(1 + mRate, months);
    payment = Math.round(bal * mRate * f / (f - 1));
    desc = `남은 ${months}개월 원리금균등 기준 · 월 납입액 약 <b>${won(payment)}</b> (이 중 첫 달 이자 ${won(interest)})`;
  } else {
    // 이자만(만기일시) 기준 = 월 이자
    payment = interest;
    desc = `이자만 낼 경우 월 <b>${won(interest)}</b> · (남은 개월수를 넣으면 원리금균등으로 계산해요)`;
  }
  setMoney('ln-monthly', payment);
  if (box) { box.style.display='flex'; box.innerHTML = '🧮 ' + desc; }
}

function addRepayment(loanId) {

  if (principal <= 0 && interest <= 0) return toast('원금 또는 이자 상환액을 입력해 주세요 🙏');

function delRepayment(id) {
  const r = db.repayments.find(x=>x.id===id); if(!r) return;
  const loan = db.loans.find(l=>l.id===r.loanId);
  // 원금이 있으면 원금만 복구, 옛 데이터(원금 없음)는 amount 전체 복구
  if (loan) loan.balance = num(loan.balance) + (num(r.principal) || num(r.amount));

function monthsUntil(dateStr) {
  if (!dateStr) return 0;
  const target = new Date(dateStr), now = new Date();
  const months = (target.getFullYear()-now.getFullYear())*12 + (target.getMonth()-now.getMonth());
  return Math.max(0, months + (target.getDate()>=now.getDate()?0:0));
}

/* =========================================================================
   일정 공유 (부부가 함께 보는 가계 일정)
   - 급여일·카드값·대출상환·기념일 등을 등록 (한 번 / 매월 반복)
   - 다가오는 일정 D-day 표시, 이번 달 일정, 카카오톡 등 공유용 텍스트 복사
   ========================================================================= */
// 'YYYY-MM-DD' → 로컬 Date (시간대 문제 방지)
function parseYMD(s) { const [y,m,d]=(s||'').split('-').map(Number); return new Date(y,(m||1)-1,d||1); }
// 오늘 0시
function startOfToday() { const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
// 일정의 다음 발생일 (매월 반복이면 오늘 이후 가장 가까운 날)
function nextOccurrence(ev) {
  const base = parseYMD(ev.date);
  if (ev.repeat !== '매월 반복') return base;
  const t = startOfToday(), day = base.getDate();
  let cand = new Date(t.getFullYear(), t.getMonth(), day);
  if (cand < t) cand = new Date(t.getFullYear(), t.getMonth()+1, day);
  return cand;
}
// 특정 월(ym)에 이 일정이 발생하는 날짜 (없으면 null)
function occurrenceInMonth(ev, ym) {
  const [y,m] = ym.split('-').map(Number);
  const base = parseYMD(ev.date);
  if (ev.repeat === '매월 반복') return new Date(y, m-1, base.getDate());
  return inMonth(ev.date, ym) ? base : null;
}
// D-day 텍스트/색상
function dday(date) {
  const diff = Math.round((date - startOfToday())/86400000);
  if (diff === 0) return { txt:'D-DAY', cls:'coral' };
  if (diff > 0)   return { txt:'D-'+diff, cls:'' };
  return { txt:'지남', cls:'soft' };
}
function fmtMD(date) { return `${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`; }
const WEEKDAYS = ['일','월','화','수','목','금','토'];

/* ---------- 공휴일 / 요일 색상 ----------
   - 양력 고정 공휴일 + 연도별 음력/대체 공휴일(설날·부처님오신날·추석 등)
   - 음력 공휴일은 해마다 날짜가 달라 2025~2027년을 직접 지정 */
const FIXED_HOLIDAYS = ['01-01','03-01','05-05','06-06','08-15','10-03','10-09','12-25'];
const VAR_HOLIDAYS = new Set([
  // 2025
  '2025-01-28','2025-01-29','2025-01-30','2025-03-03','2025-05-06',
  '2025-10-06','2025-10-07','2025-10-08','2025-10-09',
  // 2026
  '2026-02-16','2026-02-17','2026-02-18','2026-05-24','2026-05-25',
  '2026-09-24','2026-09-25','2026-09-26',
  // 2027
  '2027-02-06','2027-02-07','2027-02-08','2027-02-09','2027-05-13',
  '2027-09-14','2027-09-15','2027-09-16',
]);
// 해당 날짜가 공휴일인지
function isHoliday(date) {
  const mm = String(date.getMonth()+1).padStart(2,'0');
  const dd = String(date.getDate()).padStart(2,'0');
  if (FIXED_HOLIDAYS.includes(`${mm}-${dd}`)) return true;
  return VAR_HOLIDAYS.has(`${date.getFullYear()}-${mm}-${dd}`);
}
// 요일 색상 분류: sun(일요일·공휴일=빨강) / sat(토요일=파랑) / ''(평일=검정)
function dayClass(date) {
  if (date.getDay()===0 || isHoliday(date)) return 'sun';
  if (date.getDay()===6) return 'sat';
  return '';
}
// 요일 한 글자를 색상 적용해 반환 (목록의 "(화)" 표시용)
function weekdayHTML(date) {
  const c = dayClass(date);
  const color = c==='sun' ? '#e0524a' : (c==='sat' ? '#3f6fc4' : 'var(--text)');
  return `<span style="color:${color};font-weight:700">${WEEKDAYS[date.getDay()]}</span>`;
}

let schedFilter = '전체';   // 일정 분류 필터 (전체/재정/개인/가족)
let schedFormGroup = '재정'; // 일정 추가 폼에서 선택된 분류

// 일정의 분류를 안전하게 반환 (예전 데이터는 재정으로 간주)
function evGroup(ev) { return ev.group || '재정'; }
// 현재 필터에 맞는지
function passFilter(ev) { return schedFilter==='전체' || evGroup(ev)===schedFilter; }

function setSchedFilter(g) { schedFilter = g; renderSchedule(); }

function renderSchedule() {
  const ym = curMonth;
  // 다가오는 일정 (분류 필터 적용, 다음 발생일 기준 정렬)

    .filter(passFilter)

// 분류 선택 변경 → 그 분류의 카테고리 목록으로 교체
function onSchedGroupChange() {
  schedFormGroup = document.getElementById('sc-group').value;
  document.getElementById('sc-cat').innerHTML = schedCatOptions(schedFormGroup);
}
// 일정 종류 선택 시 제목 자동 채움(비어있을 때만)
function onSchedCatChange() {

}
function addSchedule() {
  const title = document.getElementById('sc-title').value.trim() || document.getElementById('sc-cat').value;
  db.schedules.push({
    id:uid(),
    date: document.getElementById('sc-date').value || today(),
    title,
    group: document.getElementById('sc-group').value,
    category: document.getElementById('sc-cat').value,
    repeat: document.getElementById('sc-repeat').value,
    memo: document.getElementById('sc-memo').value.trim()
  });
  save(); toast('일정을 추가했어요 📆'); renderSchedule();
}
function editSchedule(id) {
  const ev = db.schedules.find(x=>x.id===id); if(!ev) return;
  schedFormGroup = evGroup(ev);
  document.getElementById('sc-date').value=ev.date;
  document.getElementById('sc-group').value=schedFormGroup;
  document.getElementById('sc-cat').innerHTML = schedCatOptions(schedFormGroup, ev.category);
  document.getElementById('sc-repeat').value=ev.repeat;
  document.getElementById('sc-title').value=ev.title;
  document.getElementById('sc-memo').value=ev.memo||'';
  db.schedules = db.schedules.filter(x=>x.id!==id); save();
  window.scrollTo({top:0,behavior:'smooth'}); toast('수정 후 다시 추가해 주세요 ✏️'); renderSchedule();
}
// 다가오는 일정을 공유용 텍스트로 만들어 클립보드에 복사
function shareSchedule() {
  const upcoming = db.schedules
    .filter(passFilter)
    .map(ev => ({ ev, when: nextOccurrence(ev) }))
    .sort((a,b)=> a.when - b.when).slice(0,12);
  if (!upcoming.length) return toast('공유할 일정이 없어요');
  let txt = `🏠 우리집 예산노트 · 다가오는 일정${schedFilter!=='전체'?` (${schedFilter})`:''}\n\n`;
  upcoming.forEach(({ev,when})=>{
    const d = dday(when);
    txt += `${SCHED_ICON[ev.category]||'📌'} ${fmtMD(when)}(${WEEKDAYS[when.getDay()]}) ${ev.title}`
         + ` [${d.txt}]${ev.repeat==='매월 반복'?' 🔁':''}\n`;
  });
  txt += '\n💕 은정 ♡ 성현';
  copyToClipboard(txt);
}
// 클립보드 복사 (실패 시 안내)
function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(()=>toast('일정을 복사했어요! 붙여넣기로 공유하세요 📤'))
      .catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast('일정을 복사했어요! 붙여넣기로 공유하세요 📤'); }
  catch(e){ toast('복사에 실패했어요. 직접 선택해 주세요'); }
  document.body.removeChild(ta);
}

// JSON 백업
function exportJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  downloadBlob(blob, `우리집예산노트_백업_${today()}.json`);
  toast('JSON 백업을 내려받았어요 📦');
}
// JSON 복원
function importJSON(ev) {
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.incomes && !data.expenses) throw new Error('형식 오류');
      confirmModal('📥','데이터를 복원할까요?','현재 데이터가 불러온 파일로 덮어써집니다.', ()=>{
        db = data;
        const def = emptyDB();
        for (const k in def) if (!(k in db)) db[k]=def[k];
        if (!db.settings) db.settings = def.settings;
        save(); toast('데이터를 복원했어요 ✨'); renderPage(currentPage); buildNav();
      });
    } catch(err) { toast('올바른 백업 파일이 아니에요 😢'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}
// CSV 내보내기 (수입/지출/저축 통합)
function exportCSV() {
  const rows = [['유형','날짜','구분','항목','결제수단','금액','메모']];
  db.incomes.forEach(i=>rows.push(['수입',i.date,i.person,i.type,'',i.amount,i.memo||'']));
  db.expenses.forEach(e=>rows.push(['지출',e.date,e.kind,e.category,e.payment,e.amount,e.memo||'']));
  db.savings.forEach(s=>rows.push(['저축',s.date,'',s.purpose,'',s.amount,s.memo||'']));
  db.accountDeposits.forEach(d=>rows.push(['통장입금',d.date,d.from,'생활비 이체','',d.amount,d.memo||'']));
  db.investments.forEach(v=>rows.push(['투자',v.updated||'',v.holder,`${v.name}(${v.type})`,'평가금액',v.current,`원금 ${v.invested} / ${v.memo||''}`]));
  // CSV 문자열 (엑셀 한글 깨짐 방지를 위해 BOM 추가)
  const csv = '﻿' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  downloadBlob(blob, `우리집예산노트_내역_${today()}.csv`);
  toast('CSV 파일을 내려받았어요 📊');
}
// 공통 다운로드
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--brown);font-weight:600;padding:9px 0">
            <input type="checkbox" id="sync-enabled" ${syncCfg.enabled?'checked':''} style="width:16px;height:16px;accent-color:var(--coral-deep)"> 켜기
          </label>
        </div>
        <div class="field"><label>&nbsp;</label><button class="btn btn-primary" onclick="saveSyncSettings()">💾 저장 &amp; 연결</button></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
        <button class="btn btn-soft btn-sm" onclick="cloudPushNow(true)">⬆️ 지금 올리기</button>
        <button class="btn btn-soft btn-sm" onclick="cloudPull(true)">⬇️ 지금 받기</button>
      </div>
      <div id="syncStatus" class="sync-status ${syncReady?'ok':''}" style="margin-top:10px">${syncReady?'동기화 연결됨 ✓':'동기화 꺼짐 (설정 후 켜기)'}</div>

      <details style="margin-top:14px">
        <summary style="cursor:pointer;font-size:13px;font-weight:700;color:var(--brown-deep)">📋 처음 설정하는 방법 (1회만)</summary>
        <ol style="font-size:12.5px;color:var(--text);line-height:1.9;margin:10px 0 0 18px">
          <li><b>supabase.com</b> 가입 → <b>New project</b> 생성(무료)</li>
          <li>왼쪽 <b>SQL Editor</b>에서 아래 SQL 실행 → 테이블 생성</li>
          <li>왼쪽 <b>Project Settings → API</b>에서 <b>Project URL</b>과 <b>anon public</b> 키 복사 → 위에 붙여넣기</li>
          <li>두 기기(PC·휴대폰)에 <b>같은 가족 코드</b>를 넣고 "저장 &amp; 연결"</li>
          <li>한쪽에서 <b>⬆️ 지금 올리기</b> → 다른 쪽에서 <b>⬇️ 지금 받기</b> 하면 첫 연동 완료!</li>
        </ol>
        <pre style="background:var(--cream-2);border-radius:10px;padding:12px;font-size:11.5px;overflow-x:auto;margin-top:10px;white-space:pre">create table households (
  code text primary key,
  data jsonb,
  updated_at timestamptz default now()
);
alter table households enable row level security;
create policy "all" on households
  for all using (true) with check (true);
-- 실시간 연동(선택): Database → Replication 에서
-- households 테이블을 supabase_realtime 에 추가</pre>
        <p style="font-size:11.5px;color:var(--text-soft);margin-top:8px">🔒 anon 키는 공개되어도 되는 키예요. 다만 <b>가족 코드</b>가 비밀번호 역할을 하니 길게(자동 생성 권장) 쓰고 둘만 공유하세요. 동기화는 "마지막 저장이 우선"이라, 두 기기에서 동시에 다른 내용을 입력하면 나중 저장이 덮어쓸 수 있어요.</p>
      </details>
    </div>

    <div class="card">
      <div class="card-title">📖 사용 방법 안내</div>
      <ul class="guide-list">
        <li><span class="step">1</span><div><b>월 선택</b> — 화면 오른쪽 위 달력에서 월을 고르면 모든 화면이 그 달 기준으로 바뀌어요.</div></li>
        <li><span class="step">2</span><div><b>수입·지출 기록</b> — 수입/지출 메뉴에서 항목을 입력하면 자동 저장돼요. 연필(✏️)로 수정, 휴지통(🗑️)으로 삭제해요.</div></li>
        <li><span class="step">3</span><div><b>예산 설정</b> — 예산 메뉴에서 이번 달 예산을 정하면, 초과/절약을 색깔 막대로 알려줘요.</div></li>
        <li><span class="step">4</span><div><b>저축·프로젝트</b> — 목적별 저축과 장기 목표(집 장만·육아 등)를 등록하면 진행률과 월 저축 권장액을 계산해요.</div></li>
        <li><span class="step">5</span><div><b>대출 상환</b> — 대출을 등록하고 상환을 기록하면 잔액이 자동으로 줄고 진행률이 보여요.</div></li>
        <li><span class="step">6</span><div><b>백업</b> — 데이터는 이 브라우저에만 저장되니, 백업/복원 메뉴에서 JSON 백업을 주기적으로 받아두세요.</div></li>
      </ul>
      <div class="hint-box" style="margin-top:16px;margin-bottom:0">🏠 따뜻한 신혼집처럼, 두 분의 살림이 차곡차곡 쌓이길 바라요. 은정 ♡ 성현</div>
    </div>`;
}
function saveOwners() {
  db.settings.owners.wife = document.getElementById('set-wife').value.trim() || '은정';
  db.settings.owners.husband = document.getElementById('set-husband').value.trim() || '성현';
  save(); toast('이름을 저장했어요 ✨');
}
// 메뉴 이름 변경 (입력 중 실시간 반영 — 사이드바만 갱신해 입력 포커스 유지)
function renameMenu(id, val) {
  if (!db.settings.menuNames) db.settings.menuNames = {};
  const def = menuById(id).name;
  if (!val.trim() || val.trim() === def) delete db.settings.menuNames[id];
  else db.settings.menuNames[id] = val.trim();
  save(); buildNav();
  if (currentPage === id) document.getElementById('pageTitle').textContent = menuName(menuById(id));
}
// 메뉴 순서 이동 (네비 메뉴 기준 앞/뒤 교환)
function moveMenu(id, dir) {
  const nav = getMenuOrder().filter(x => x !== 'dashboard');
  const i = nav.indexOf(id), j = i + dir;
  if (i < 0 || j < 0 || j >= nav.length) return;
  [nav[i], nav[j]] = [nav[j], nav[i]];
  db.settings.menuOrder = ['dashboard', ...nav];   // 대시보드는 순서 보존용으로 앞에 유지
  save(); buildNav(); renderSettings();
}
// 메뉴 드래그 앤 드롭으로 순서 변경
let menuDragId = null;
function menuDragStart(e, id) {
  menuDragId = id;
  e.dataTransfer.effectAllowed = 'move';
  const row = e.target.closest('.menu-edit-row');
  if (row) row.classList.add('mdragging');
}
function menuDragOver(e, row) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (row) row.classList.add('mdragover');
}
function menuDragEnd() {
  menuDragId = null;
  document.querySelectorAll('.menu-edit-row').forEach(r => r.classList.remove('mdragging','mdragover'));
}
function menuDrop(e, targetId) {
  e.preventDefault();
  if (!menuDragId || menuDragId === targetId) return;
  const nav = getMenuOrder().filter(x => x !== 'dashboard');
  nav.splice(nav.indexOf(menuDragId), 1);     // 끌고온 항목 빼고
  nav.splice(nav.indexOf(targetId), 0, menuDragId);  // 대상 앞에 삽입
  db.settings.menuOrder = ['dashboard', ...nav];
  save(); buildNav(); renderSettings();
}
// 메뉴 이름·순서 기본값으로 되돌리기
function resetMenus() {
  db.settings.menuOrder = []; db.settings.menuNames = {};
  save(); buildNav(); renderSettings(); toast('메뉴를 기본값으로 되돌렸어요');
}
function changePin() {
  const oldP = document.getElementById('set-pin-old').value;
  const n1 = document.getElementById('set-pin-new').value;
  const n2 = document.getElementById('set-pin-new2').value;
  if (oldP !== db.settings.pin) return toast('현재 PIN이 맞지 않아요 😢');
  if (!/^\d{4}$/.test(n1)) return toast('새 PIN은 숫자 4자리여야 해요');
  if (n1 !== n2) return toast('새 PIN 확인이 일치하지 않아요');
  db.settings.pin = n1; save(); toast('PIN을 변경했어요 🔑');
  document.getElementById('set-pin-old').value='';
  document.getElementById('set-pin-new').value='';
  document.getElementById('set-pin-new2').value='';
}

/* =========================================================================
   공통 삭제 (수입/지출/저축)
   ========================================================================= */
function delItem(coll, id) {
  confirmModal('🗑️','이 내역을 삭제할까요?','삭제하면 되돌릴 수 없어요.', ()=>{
    db[coll] = db[coll].filter(x=>x.id!==id);
    save(); toast('삭제했어요'); renderPage(currentPage);
  });
}

/* =========================================================================
   ⑰ 공통 UI — 토스트 / 확인 모달
   ========================================================================= */
let _toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

let _modalCb = null;
function confirmModal(emoji, title, msg, cb) {
  document.getElementById('modalEmoji').textContent = emoji;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  _modalCb = cb;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
  _modalCb = null;
}
document.getElementById('modalConfirm').addEventListener('click', ()=>{
  if (_modalCb) _modalCb();
  closeModal();
});

/* =========================================================================
   ⑱ 부팅
   ========================================================================= */
function bootApp() {
  buildNav();
  initMonthFilter();
  // 대시보드를 히스토리 기준점으로 설정 (이후 다른 페이지에서 뒤로가기 시 대시보드로 복귀)
  history.replaceState({ page:'dashboard' }, '', '#dashboard');
  goto('dashboard', true);
  startSync();   // 클라우드 동기화 시작(설정돼 있으면)
}

/* =========================================================================
   ⑲ 클라우드 동기화 (Supabase) — PC ↔ 모바일 실시간 연동
   - 전체 db(JSON)를 households 테이블의 한 행(code 기준)에 저장/동기화
   - 마지막 저장이 이기는(LWW) 방식: db._updatedAt 시각으로 최신본 판별
   - 동기화 설정(URL/Key/가족코드)은 db와 별도의 localStorage 키에 보관
   ========================================================================= */
const SYNC_KEY = 'honeyBudget_sync_v1';
let syncCfg = loadSyncCfg();
let sb = null;              // Supabase 클라이언트
let syncReady = false;      // 연결 완료 여부
let applyingRemote = false; // 원격 데이터 적용 중(이때의 save는 다시 푸시하지 않음)
let pushTimer = null;       // 푸시 디바운스 타이머
let lastPull = 0;           // 마지막 받기 시각(과도한 호출 방지)

function loadSyncCfg() {
  try { return Object.assign({ url:'', key:'', code:'', enabled:false }, JSON.parse(localStorage.getItem(SYNC_KEY) || '{}')); }
  catch(e) { return { url:'', key:'', code:'', enabled:false }; }
}
// Supabase 기본 URL만 남기기 (실수로 붙은 /rest/v1, 끝 슬래시, 공백 제거)
function cleanSupabaseUrl(u) {
  u = (u || '').trim();
  u = u.replace(/\/+$/,'');              // 끝 슬래시 제거
  u = u.replace(/\/rest(\/v\d+)?$/i,''); // /rest 또는 /rest/v1 제거
  u = u.replace(/\/auth(\/v\d+)?$/i,''); // 혹시 /auth/v1 도 제거
  u = u.replace(/\/+$/,'');
  return u;
}
function saveSyncCfg() { localStorage.setItem(SYNC_KEY, JSON.stringify(syncCfg)); }

// 동기화 상태 표시(설정 화면에 있을 때만)
function syncStatus(msg, kind) {
  const el = document.getElementById('syncStatus');
  if (el) { el.textContent = msg; el.className = 'sync-status ' + (kind||''); }
}

// 클라이언트 생성
function initSupabase() {
  syncReady = false; sb = null;
  if (!syncCfg.enabled || !syncCfg.url || !syncCfg.key || !syncCfg.code) return false;
  if (typeof supabase === 'undefined' || !supabase.createClient) {
    syncStatus('Supabase 라이브러리를 불러오지 못했어요. 인터넷 연결을 확인해 주세요.', 'err');
    return false;
  }
  try {
    sb = supabase.createClient(cleanSupabaseUrl(syncCfg.url), syncCfg.key.trim());
    syncReady = true;
    return true;
  } catch(e) {
    syncStatus('연결 설정 오류: ' + e.message, 'err');
    return false;
  }
}

// 앱 시작 시 동기화 가동
function startSync() {
  if (!initSupabase()) return;
  syncStatus('동기화 연결됨 · 데이터 받는 중…', 'ok');
  cloudPull(false);
  subscribeRealtime();
}

// 클라우드 → 로컬 (받기)
async function cloudPull(showToast) {
  if (!syncReady) { if(showToast) toast('먼저 동기화를 설정해 주세요'); return; }
  lastPull = Date.now();
  try {
    const { data, error } = await sb.from('households').select('data, updated_at').eq('code', syncCfg.code.trim()).maybeSingle();
    if (error) { syncStatus('받기 실패: ' + error.message, 'err'); return; }
    if (!data) { syncStatus('클라우드에 아직 데이터가 없어요. "지금 올리기"로 먼저 올려주세요.', 'warn'); return; }
    const remoteTs = new Date(data.updated_at || 0).getTime();
    const localTs = db._updatedAt || 0;
    if (remoteTs >= localTs) {
      applyingRemote = true;
      db = data.data || {};
      const def = emptyDB();
      for (const k in def) if (!(k in db)) db[k] = def[k];
      if (!db.settings) db.settings = def.settings;
      if (!db.settings.dashWidgets) db.settings.dashWidgets = {};
      if (!db.settings.dashOrder) db.settings.dashOrder = [];
      if (!db.memos) db.memos = [];
      db._updatedAt = remoteTs;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
      applyingRemote = false;
      buildNav(); renderPage(currentPage);
      syncStatus('최신 데이터를 받았어요 ✓ ' + new Date(remoteTs).toLocaleString('ko-KR'), 'ok');
      if (showToast) toast('동기화 완료 (받기) ☁️⬇️');
    } else {
      syncStatus('이 기기 데이터가 더 최신이에요. "지금 올리기"를 해주세요.', 'warn');
      if (showToast) toast('이 기기가 더 최신이에요 — 올리기를 해주세요');
    }
  } catch(e) { syncStatus('받기 오류: ' + e.message, 'err'); }
}

// 로컬 → 클라우드 (올리기)
async function cloudPushNow(showToast) {
  if (!syncReady) { if(showToast) toast('먼저 동기화를 설정해 주세요'); return; }
  const ts = db._updatedAt || Date.now();
  try {
    const { error } = await sb.from('households').upsert({
      code: syncCfg.code.trim(),
      data: db,
      updated_at: new Date(ts).toISOString()
    });
    if (error) { syncStatus('올리기 실패: ' + error.message, 'err'); if(showToast) toast('올리기 실패 😢'); }
    else { syncStatus('클라우드에 저장됨 ✓ ' + new Date(ts).toLocaleTimeString('ko-KR'), 'ok'); if(showToast) toast('동기화 완료 (올리기) ☁️⬆️'); }
  } catch(e) { syncStatus('올리기 오류: ' + e.message, 'err'); }
}

// 저장 시 자동 푸시(0.8초 디바운스)
function cloudPushDebounced() {
  if (!syncReady || applyingRemote) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => cloudPushNow(false), 800);
}

// 실시간 구독: 다른 기기가 저장하면 자동으로 받기
function subscribeRealtime() {
  if (!syncReady) return;
  try {
    sb.channel('hh-' + syncCfg.code.trim())
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'households', filter: 'code=eq.' + syncCfg.code.trim() },
        () => { if (!applyingRemote) cloudPull(false); })
      .subscribe();
  } catch(e) { /* 실시간 미설정 시 무시(받기 버튼/포커스 동기화로 대체) */ }
}

// 화면을 다시 볼 때(앱 전환·탭 복귀) 자동으로 받기 — 모바일 연동에 유용
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && syncReady && Date.now() - lastPull > 3000) cloudPull(false);
});

// 설정 화면에서 호출: 동기화 설정 저장 후 연결
function saveSyncSettings() {
  syncCfg.url = cleanSupabaseUrl(document.getElementById('sync-url').value);
  syncCfg.key = document.getElementById('sync-key').value.trim();
  syncCfg.code = document.getElementById('sync-code').value.trim();
  syncCfg.enabled = document.getElementById('sync-enabled').checked;
  if (syncCfg.enabled && (!syncCfg.url || !syncCfg.key || !syncCfg.code))
    return toast('URL · Key · 가족 코드를 모두 입력해 주세요 🙏');
  saveSyncCfg();
  if (syncCfg.enabled) { if (initSupabase()) { subscribeRealtime(); cloudPull(true); toast('동기화를 켰어요 ☁️'); } }
  else { syncReady = false; sb = null; syncStatus('동기화 꺼짐', ''); toast('동기화를 껐어요'); }
}
// 가족 코드 자동 생성
function genSyncCode() {
  const s = 'abcdefghijkmnpqrstuvwxyz23456789';
  let c = 'home-';
  for (let i=0;i<10;i++) c += s[Math.floor(Math.random()*s.length)];
  const el = document.getElementById('sync-code'); if (el) el.value = c;
}

// 시작: 데이터 로드 → PIN 화면
load();
initLock();
</script>
